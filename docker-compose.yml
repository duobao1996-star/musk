version: '3.8'

services:
  webman-api:
    build: .
    container_name: webman-musk-api
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./runtime:/app/runtime
      - ./logs:/app/logs
      - ~/.ssh:/root/.ssh:ro  # 挂载SSH密钥
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    networks:
      - webman-network

  mysql:
    image: mysql:8.0
    container_name: webman-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: newsf1
      MYSQL_USER: newsf1
      MYSQL_PASSWORD: newsf1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - webman-network

  redis:
    image: redis:7-alpine
    container_name: webman-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - webman-network

  nginx:
    image: nginx:alpine
    container_name: webman-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./public:/var/www/html
    depends_on:
      - webman-api
    networks:
      - webman-network

  # 自动部署服务
  auto-deploy:
    build: .
    container_name: webman-auto-deploy
    restart: unless-stopped
    volumes:
      - ./runtime:/app/runtime
      - ~/.ssh:/root/.ssh:ro
      - ./docker/auto-deploy.sh:/usr/local/bin/auto-deploy.sh
    environment:
      - GITHUB_REPO=duobao1996-star/musk
      - BAOTA_SERVER=your_baota_server_ip
      - BAOTA_USER=root
      - BAOTA_PATH=/www/wwwroot/musk
    command: ["/usr/local/bin/auto-deploy.sh", "loop"]
    networks:
      - webman-network

volumes:
  mysql_data:
  redis_data:

networks:
  webman-network:
    driver: bridge
